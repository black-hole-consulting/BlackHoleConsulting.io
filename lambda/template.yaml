AWSTemplateFormatVersion: '2010-09-09'
Description: Black Hole Consulting - Contact Form API

Parameters:
  BrevoApiKey:
    Type: String
    NoEcho: true
    Description: Brevo API Key for sending emails

Resources:
  # IAM Role for Lambda
  ContactFormRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: bhc-contact-form-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # Lambda Function
  ContactFormFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: bhc-contact-form
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt ContactFormRole.Arn
      Timeout: 10
      MemorySize: 128
      Architectures:
        - arm64
      Environment:
        Variables:
          BREVO_API_KEY: !Ref BrevoApiKey
      Code:
        ZipFile: |
          // Placeholder - will be updated by CI/CD
          exports.handler = async () => ({ statusCode: 200, body: 'OK' });

  # Lambda Permission for API Gateway
  ContactFormPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ContactFormFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ContactFormApi}/*'

  # HTTP API Gateway
  ContactFormApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: bhc-contact-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - https://blackholeconsulting.io
          - http://localhost:4321
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # API Gateway Integration
  ContactFormIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ContactFormApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ContactFormFunction.Arn
      PayloadFormatVersion: '2.0'

  # API Gateway Route - POST /contact
  ContactFormRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ContactFormApi
      RouteKey: POST /contact
      Target: !Sub 'integrations/${ContactFormIntegration}'

  # API Gateway Stage
  ContactFormStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ContactFormApi
      StageName: $default
      AutoDeploy: true

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ContactFormApi}.execute-api.${AWS::Region}.amazonaws.com/contact'
    Export:
      Name: BHCContactApiEndpoint

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ContactFormFunction.Arn
